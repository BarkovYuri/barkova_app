server {
    listen 80;
    server_name doctor-barkova.ru;

    client_max_body_size 20M;

    location / {
        return 301 https://doctor-barkova.ru$request_uri;
    }
}

server {
    listen 80;
    server_name www.doctor-barkova.ru;

    location / {
        return 301 https://doctor-barkova.ru$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name doctor-barkova.ru;

    ssl_certificate /etc/letsencrypt/live/doctor-barkova.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/doctor-barkova.ru/privkey.pem;

    client_max_body_size 20M;

    location /static/ {
        alias /app/staticfiles/;
    }

    location /media/ {
        alias /app/media/;
    }

    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        proxy_pass http://backend:8000/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://frontend:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl;
    server_name www.doctor-barkova.ru;

    ssl_certificate /etc/letsencrypt/live/doctor-barkova.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/doctor-barkova.ru/privkey.pem;

    location / {
        return 301 https://doctor-barkova.ru$request_uri;
    }
}