# Глобальный http блок (для limit_req_zone)
http {
    # Ограничение запросов: 20 req/s на IP, зона general
    limit_req_zone $binary_remote_addr zone=general:10m rate=20r/s;

    # ──────────────────────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name doctor-barkova.ru;

        client_max_body_size 20M;

        location / {
            return 301 https://doctor-barkova.ru$request_uri;
        }
    }

    server {
        listen 80;
        server_name www.doctor-barkova.ru;

        location / {
            return 301 https://doctor-barkova.ru$request_uri;
        }
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name doctor-barkova.ru;

        ssl_certificate /etc/letsencrypt/live/doctor-barkova.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/doctor-barkova.ru/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:10m;
        ssl_session_tickets off;

        client_max_body_size 20M;

        # ── Security headers ──────────────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy
            "default-src 'self'; \
             script-src 'self' 'unsafe-inline' https://id.vk.ru https://vk.com; \
             style-src 'self' 'unsafe-inline'; \
             img-src 'self' data: https:; \
             connect-src 'self' https://id.vk.ru https://api.vk.com https://api.telegram.org; \
             frame-ancestors 'none';"
            always;

        # ── Rate limiting ────────────────────────────────────────────────────
        limit_req zone=general burst=60 nodelay;

        # ── Static & media ─────────────────────────────────────────────────
        location /static/ {
            alias /app/staticfiles/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        location /media/ {
            alias /app/media/;
            expires 7d;
            add_header Cache-Control "public";
        }

        # ── Backend API ───────────────────────────────────────────────────
        location /api/ {
            proxy_pass http://backend:8000/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /admin/ {
            proxy_pass http://backend:8000/admin/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Frontend ──────────────────────────────────────────────────────
        location / {
            proxy_pass http://frontend:3000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name www.doctor-barkova.ru;

        ssl_certificate /etc/letsencrypt/live/doctor-barkova.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/doctor-barkova.ru/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;

        location / {
            return 301 https://doctor-barkova.ru$request_uri;
        }
    }
}