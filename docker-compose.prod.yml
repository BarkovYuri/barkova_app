services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: doctor_db
      POSTGRES_USER: doctor_user
      POSTGRES_PASSWORD: doctor_password
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly no
    volumes:
      - redis_data:/data

  backend:
    image: ghcr.io/barkovyuri/barkova_app-backend:latest
    restart: always
    env_file:
      - .env
    depends_on:
      - db
      - redis
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    expose:
      - "8000"

  celery_worker:
    image: ghcr.io/barkovyuri/barkova_app-backend:latest
    restart: always
    env_file:
      - .env
    depends_on:
      - db
      - redis
      - backend
    command: celery -A config worker -l info

  celery_beat:
    image: ghcr.io/barkovyuri/barkova_app-backend:latest
    restart: always
    env_file:
      - .env
    depends_on:
      - db
      - redis
      - backend
    command: celery -A config beat -l info

  telegram_bot:
    image: ghcr.io/barkovyuri/barkova_app-backend:latest
    restart: always
    env_file:
      - .env
    depends_on:
      - db
      - redis
      - backend
    command: python telegram_bot.py

  frontend:
    image: ghcr.io/barkovyuri/barkova_app-frontend:latest
    restart: always
    env_file:
      - .env
    expose:
      - "3000"

  nginx:
    image: nginx:latest
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx:/etc/nginx/conf.d
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume: