services:
  db:
    image: postgres:16
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly no
    volumes:
      - redis_data:/data

  backend:
    image: ghcr.io/barkovyuri/barkova_app-backend:latest
    restart: always
    env_file:
      - .env
    environment:
      # Прокси для исходящих к Telegram API (Роскомнадзор блокирует
      # api.telegram.org для российских хостингов). Если TELEGRAM_PROXY_URL
      # пустой — прокси не используется.
      HTTPS_PROXY: ${TELEGRAM_PROXY_URL:-}
      HTTP_PROXY: ${TELEGRAM_PROXY_URL:-}
      NO_PROXY: localhost,127.0.0.1,backend,db,redis,frontend,nginx,celery_worker,celery_beat,telegram_bot,api.vk.com,id.vk.ru
    depends_on:
      - db
      - redis
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    expose:
      - "8000"

  celery_worker:
    image: ghcr.io/barkovyuri/barkova_app-backend:latest
    restart: always
    env_file:
      - .env
    environment:
      HTTPS_PROXY: ${TELEGRAM_PROXY_URL:-}
      HTTP_PROXY: ${TELEGRAM_PROXY_URL:-}
      NO_PROXY: localhost,127.0.0.1,backend,db,redis,frontend,nginx,celery_worker,celery_beat,telegram_bot,api.vk.com,id.vk.ru
    depends_on:
      - db
      - redis
      - backend
    command: celery -A config worker -l info

  celery_beat:
    image: ghcr.io/barkovyuri/barkova_app-backend:latest
    restart: always
    env_file:
      - .env
    environment:
      HTTPS_PROXY: ${TELEGRAM_PROXY_URL:-}
      HTTP_PROXY: ${TELEGRAM_PROXY_URL:-}
      NO_PROXY: localhost,127.0.0.1,backend,db,redis,frontend,nginx,celery_worker,celery_beat,telegram_bot,api.vk.com,id.vk.ru
    depends_on:
      - db
      - redis
      - backend
    command: celery -A config beat -l info

  telegram_bot:
    image: ghcr.io/barkovyuri/barkova_app-backend:latest
    restart: always
    env_file:
      - .env
    environment:
      HTTPS_PROXY: ${TELEGRAM_PROXY_URL:-}
      HTTP_PROXY: ${TELEGRAM_PROXY_URL:-}
      NO_PROXY: localhost,127.0.0.1,backend,db,redis,frontend,nginx,celery_worker,celery_beat,telegram_bot,api.vk.com,id.vk.ru
    depends_on:
      - db
      - redis
      - backend
    command: python telegram_bot.py

  frontend:
    image: ghcr.io/barkovyuri/barkova_app-frontend:latest
    restart: always
    env_file:
      - .env
    expose:
      - "3000"

  nginx:
    image: nginx:latest
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx:/etc/nginx/conf.d
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:
